name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Set up JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Build signed release artifacts
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          signing_dir="$RUNNER_TEMP/signing"
          keystore_path="$signing_dir/release.jks"
          cleanup() {
            rm -f "$keystore_path"
            rmdir "$signing_dir" 2>/dev/null || true
          }
          trap cleanup EXIT
          mkdir -p "$signing_dir"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          chmod 600 "$keystore_path"
          export ANDROID_KEYSTORE_PATH="$keystore_path"
          ./gradlew --dependency-verification=strict :app:assembleRelease :app:bundleRelease :app:generateReleaseSbom

      - name: Verify release signing identity
        run: |
          set -euo pipefail
          mapfile -t release_apks < <(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' -print | sort)
          if [ "${#release_apks[@]}" -ne 1 ]; then
            printf '::error::Expected exactly one release APK, found %s.\n' "${#release_apks[@]}"
            printf 'Candidate: %s\n' "${release_apks[@]:-<none>}"
            exit 1
          fi

          apksigner="$(find "$ANDROID_HOME/build-tools" -maxdepth 2 -name apksigner -print | sort -V | tail -n 1)"
          if [ -z "$apksigner" ] || [ ! -x "$apksigner" ]; then
            printf '::error::Could not locate an executable apksigner under ANDROID_HOME.\n'
            exit 1
          fi

          if ! certificate_output="$("$apksigner" verify --verbose --print-certs-pem "${release_apks[0]}" 2>&1)"; then
            printf '::error::apksigner rejected the release APK.\n'
            printf '%s\n' "$certificate_output"
            exit 1
          fi
          signer_count="$(awk '/^-----BEGIN CERTIFICATE-----$/ { count++ } END { print count + 0 }' <<< "$certificate_output")"
          expected_sha256="$(tr '[:upper:]' '[:lower:]' < .github/release-signing-cert-sha256.txt | tr -d '[:space:]')"

          if ! [[ "$expected_sha256" =~ ^[0-9a-f]{64}$ ]]; then
            printf '::error::Pinned release certificate SHA-256 is malformed.\n'
            exit 1
          fi
          if [ "$signer_count" != "1" ]; then
            printf '::error::Expected one APK signer, detected %s.\n' "${signer_count:-none}"
            exit 1
          fi

          certificate_base64="$(awk '
            /^-----BEGIN CERTIFICATE-----$/ { in_certificate = 1; next }
            /^-----END CERTIFICATE-----$/ { if (in_certificate) exit }
            in_certificate { print }
          ' <<< "$certificate_output")"
          if [ -z "$certificate_base64" ]; then
            printf '::error::Could not extract the APK signing certificate.\n'
            exit 1
          fi
          actual_sha256="$(printf '%s' "$certificate_base64" | base64 --decode | sha256sum | awk '{ print tolower($1) }')"

          printf 'Release signer SHA-256: %s\n' "${actual_sha256:-unavailable}"
          if [ "$actual_sha256" != "$expected_sha256" ]; then
            printf '::error::Release APK signer does not match the pinned production certificate.\n'
            exit 1
          fi

      - name: Prepare release bundle
        if: github.ref_type == 'tag'
        run: |
          mkdir -p build/release
          cp app/build/outputs/apk/release/*.apk build/release/
          cp app/build/outputs/bundle/release/*.aab build/release/
          cp app/build/reports/sbom/release-sbom.cdx.json build/release/
          cat > build/release/build-provenance.json <<EOF
          {
            "repository": "${GITHUB_REPOSITORY}",
            "ref": "${GITHUB_REF}",
            "tag": "${GITHUB_REF_NAME}",
            "commit": "${GITHUB_SHA}",
            "workflow": "${GITHUB_WORKFLOW}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}"
          }
          EOF
          (cd build/release && sha256sum * > SHA256SUMS)

      - name: Attest release artifacts
        if: github.ref_type == 'tag'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: 'build/release/*'

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes_file="docs/releases/${GITHUB_REF_NAME}.md"
          test -f "$notes_file"
          cp "$notes_file" "$RUNNER_TEMP/release-notes.md"
          printf '\n\nBuild: %s (%s)\n' "$GITHUB_REF_NAME" "$GITHUB_SHA" >> "$RUNNER_TEMP/release-notes.md"
          gh release create "$GITHUB_REF_NAME" build/release/* \
            --title "$GITHUB_REF_NAME" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            --verify-tag \
            --latest
