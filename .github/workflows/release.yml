name: Android Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode release signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/signing/release.jks" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build signed release artifacts
        run: ./gradlew --dependency-verification=strict :app:assembleRelease :app:bundleRelease :app:generateReleaseSbom

      - name: Verify release signing identity
        run: |
          mapfile -t release_apks < <(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk')
          test "${#release_apks[@]}" -eq 1
          apksigner="$(find "$ANDROID_HOME/build-tools" -maxdepth 2 -type f -name apksigner | sort -V | tail -n 1)"
          test -x "$apksigner"
          certificate_output="$("$apksigner" verify --verbose --print-certs "${release_apks[0]}")"
          signer_count="$(awk -F': ' '/Number of signers:/ { print $2; exit }' <<< "$certificate_output")"
          actual_sha256="$(awk -F': ' '/Signer #1 certificate SHA-256 digest:/ { print tolower($2); exit }' <<< "$certificate_output")"
          expected_sha256="$(tr -d '[:space:]' < .github/release-signing-cert-sha256.txt)"
          test "$signer_count" = "1"
          test "$actual_sha256" = "$expected_sha256"

      - name: Prepare release bundle
        run: |
          mkdir -p build/release
          cp app/build/outputs/apk/release/*.apk build/release/
          cp app/build/outputs/bundle/release/*.aab build/release/
          cp app/build/reports/sbom/release-sbom.cdx.json build/release/
          cat > build/release/build-provenance.json <<EOF
          {
            "repository": "${GITHUB_REPOSITORY}",
            "ref": "${GITHUB_REF}",
            "tag": "${GITHUB_REF_NAME}",
            "commit": "${GITHUB_SHA}",
            "workflow": "${GITHUB_WORKFLOW}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}"
          }
          EOF
          (cd build/release && sha256sum * > SHA256SUMS)

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'build/release/*'

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes_file="docs/releases/${GITHUB_REF_NAME}.md"
          test -f "$notes_file"
          cp "$notes_file" "$RUNNER_TEMP/release-notes.md"
          printf '\n\nBuild: %s (%s)\n' "$GITHUB_REF_NAME" "$GITHUB_SHA" >> "$RUNNER_TEMP/release-notes.md"
          gh release create "$GITHUB_REF_NAME" build/release/* \
            --title "$GITHUB_REF_NAME" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            --verify-tag \
            --latest
